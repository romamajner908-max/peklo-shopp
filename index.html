<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEKLO SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        .product {
            background: #1e1e1e;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-name { font-weight: bold; }
        .product-price { color: #e8491d; }
        .btn {
            background: #e8491d;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover { background: #c73d17; }
        .btn-secondary { background: #333; }
        .cart-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            padding: 12px;
            border-top: 2px solid #e8491d;
            display: flex;
            justify-content: space-between;
        }
        .hidden { display: none; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
        }
        .footer {
            text-align: center;
            padding: 16px;
            color: #555;
            font-size: 12px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <h1 style="color:#e8491d;">PEKLO SHOP</h1>
    
    <div id="products"></div>
    
    <div class="cart-panel" id="cartPanel">
        <div>
            <div id="cartCount">0 товаров</div>
            <div id="cartTotal">0 руб</div>
        </div>
        <button class="btn" onclick="openCheckout()">Оформить</button>
    </div>
    
    <div class="modal hidden" id="checkoutModal">
        <div class="modal-content">
            <h2 style="color:#e8491d;">Оформление заказа</h2>
            <div id="cartSummary" style="margin: 10px 0; padding: 10px; background: #2a2a2a; border-radius: 4px;"></div>
            <form id="orderForm">
                <input type="text" id="customerName" placeholder="Ваше имя" required>
                <input type="text" id="customerTelegram" placeholder="Telegram username или ID" required>
                <input type="text" id="deliveryAddress" placeholder="Адрес доставки" required>
                <input type="text" id="deliveryTime" placeholder="Время доставки" required>
                <button class="btn" style="width:100%; margin-top:10px;" type="submit">Оформить заказ</button>
            </form>
            <button class="btn btn-secondary" style="width:100%; margin-top:10px;" onclick="closeCheckout()">Отмена</button>
        </div>
    </div>
    
    <div class="footer">made by tr1ppy</div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let products = [];
        let cart = [];
        let cartTotal = 0;
        
        function loadProducts() {
            fetch("products.json?" + Date.now())
                .then(r => r.json())
                .then(data => {
                    products = data;
                    renderProducts();
                })
                .catch(() => {
                    products = [];
                    renderProducts();
                });
        }
        
        function renderProducts() {
            const container = document.getElementById('products');
            if (!products.length) {
                container.innerHTML = '<p style="color:#888;">Каталог пуст</p>';
                return;
            }
            container.innerHTML = products.map(p => `
                <div class="product">
                    <div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price} руб</div>
                    </div>
                    <button class="btn" onclick="addToCart(${p.id})">В корзину</button>
                </div>
            `).join('');
        }
        
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            const existing = cart.find(i => i.id === id);
            if (existing) existing.quantity += 1;
            else cart.push({...product, quantity: 1});
            updateCart();
        }
        
        function updateCart() {
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            cartTotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            document.getElementById('cartCount').textContent = count + ' товаров';
            document.getElementById('cartTotal').textContent = cartTotal + ' руб';
        }
        
        function openCheckout() {
            if (!cart.length) {
                tg.showAlert('Корзина пуста');
                return;
            }
            const summary = document.getElementById('cartSummary');
            summary.innerHTML = cart.map(i => 
                `<div>${i.name} x${i.quantity} = ${i.price * i.quantity} руб</div>`
            ).join('') + `<div style="font-weight:bold;margin-top:8px;">Итого: ${cartTotal} руб</div>`;
            document.getElementById('checkoutModal').classList.remove('hidden');
        }
        
        function closeCheckout() {
            document.getElementById('checkoutModal').classList.add('hidden');
        }
        
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('customerName').value.trim();
            const tgUser = document.getElementById('customerTelegram').value.trim();
            const addr = document.getElementById('deliveryAddress').value.trim();
            const time = document.getElementById('deliveryTime').value.trim();
            
            if (!name || !addr || !time) {
                tg.showAlert('Заполните все поля');
                return;
            }
            
            const orderData = {
                action: 'order',
                customer_name: name,
                customer_telegram: tgUser || 'Не указан',
                delivery_address: addr,
                delivery_time: time,
                items: cart,
                total_price: cartTotal
            };
            
            console.log('📦 Отправка заказа:', orderData);
            tg.sendData(JSON.stringify(orderData));
            console.log('✅ Заказ отправлен');
            
            cart = [];
            updateCart();
            closeCheckout();
            tg.showAlert('Заказ оформлен!');
        });
        
        loadProducts();
    </script>
</body>
</html>
