<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEKLO SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #111;
            --text-color: #fff;
            --btn-color: #e50914;
            --btn-text-color: #fff;
            --card-bg: #222;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header {
            padding: 15px;
            text-align: center;
            background: #000;
            border-bottom: 2px solid var(--btn-color);
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .tabs {
            display: flex;
            overflow-x: auto;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            flex: 1;
            min-width: 90px;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .tab-btn.active {
            color: var(--text-color);
            border-bottom: 3px solid var(--btn-color);
        }
        .container {
            padding: 15px;
            padding-bottom: 140px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .product-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #333;
        }
        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .product-desc {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: var(--btn-color);
            margin-bottom: 10px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--btn-color);
            color: var(--btn-text-color);
        }
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            padding: 15px;
            border-top: 2px solid #333;
            display: none;
            z-index: 100;
        }
        .cart-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .order-form {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .order-form input {
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }
        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PEKLO SHOP</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchCategory('снюс', this)">Снюс</button>
        <button class="tab-btn" onclick="switchCategory('жижа', this)">Жижа</button>
        <button class="tab-btn" onclick="switchCategory('подики', this)">Подики</button>
        <button class="tab-btn" onclick="switchCategory('одноразки', this)">Одноразки</button>
    </div>

    <div class="container">
        <div id="productsContainer" class="products-grid"></div>
    </div>

    <div id="cartBar" class="cart-bar">
        <div class="cart-info">
            <span id="cartCount">Корзина: 0 шт.</span>
            <span id="cartTotal">0 руб</span>
        </div>
        <button class="btn btn-primary" id="actionBtn" onclick="showOrderForm()">Оформить заказ</button>
        
        <div id="orderForm" class="order-form">
            <input type="text" id="custName" placeholder="Ваше имя" required>
            <input type="text" id="custAddr" placeholder="Адрес доставки" required>
            <input type="text" id="custTime" placeholder="Удобное время доставки" required>
            <button class="btn btn-primary" style="background:#00b020;" onclick="submitOrder()">Подтвердить и отправить</button>
        </div>
    </div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.expand();

        var products = [];
        var cart = {};
        var currentCategory = 'снюс';

        // Загрузка товаров с защитой от жесткого кэширования браузером (?v=...)
        function loadProducts() {
            fetch('products.json?v=' + Date.now())
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    products = data;
                    renderProducts();
                })
                .catch(function(err) {
                    console.error("Ошибка загрузки каталога:", err);
                    document.getElementById('productsContainer').innerHTML = 
                        '<div class="empty-message">Ошибка при загрузке товаров.</div>';
                });
        }

        function switchCategory(cat, btn) {
            currentCategory = cat;
            var buttons = document.getElementsByClassName('tab-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btn.classList.add('active');
            
            // Скрываем форму заказа, если переключили категорию
            document.getElementById('orderForm').style.display = 'none';
            document.getElementById('actionBtn').style.display = 'block';
            
            renderProducts();
        }

        // Исправленная и надежная функция отрисовки товаров
        function renderProducts() {
            var container = document.getElementById('productsContainer');
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="empty-message">Каталог пуст</div>';
                return;
            }

            // Фильтрация без учета регистра букв и пробелов
            var filtered = products.filter(function(p) {
                var pCat = p.category || 'снюс';
                return pCat.toLowerCase().trim() === currentCategory.toLowerCase().trim();
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-message">Товары в этой категории временно отсутствуют</div>';
                return;
            }

            container.innerHTML = '';
            for (var i = 0; i < filtered.length; i++) {
                var p = filtered[i];
                var card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = 
                    '<div class="product-name">' + p.name + '</div>' +
                    '<div class="product-desc">' + (p.description || '') + '</div>' +
                    '<div class="product-price">' + p.price + ' руб</div>' +
                    '<button class="btn btn-primary" onclick="addToCart(' + p.id + ')">В корзину</button>';
                container.appendChild(card);
            }
        }

        function addToCart(id) {
            var p = products.find(function(item) { return item.id === id; });
            if (!p) return;
            
            if (cart[id]) {
                cart[id].quantity += 1;
            } else {
                cart[id] = { name: p.name, price: p.price, quantity: 1 };
            }
            updateCartBar();
        }

        function updateCartBar() {
            var count = 0;
            var total = 0;
            for (var id in cart) {
                count += cart[id].quantity;
                total += cart[id].price * cart[id].quantity;
            }

            var bar = document.getElementById('cartBar');
            if (count > 0) {
                bar.style.display = 'block';
                document.getElementById('cartCount').innerText = 'Корзина: ' + count + ' шт.';
                document.getElementById('cartTotal').innerText = total + ' руб';
            } else {
                bar.style.display = 'none';
            }
        }

        function showOrderForm() {
            document.getElementById('actionBtn').style.display = 'none';
            document.getElementById('orderForm').style.display = 'flex';
        }

        function submitOrder() {
            var name = document.getElementById('custName').value.trim();
            var addr = document.getElementById('custAddr').value.trim();
            var time = document.getElementById('custTime').value.trim();

            if (!name || !addr || !time) {
                alert('Пожалуйста, заполните все поля формы.');
                return;
            }

            var items = [];
            var total = 0;
            for (var id in cart) {
                items.push({
                    id: parseInt(id),
                    name: cart[id].name,
                    price: cart[id].price,
                    quantity: cart[id].quantity
                });
                total += cart[id].price * cart[id].quantity;
            }

            var orderData = {
                action: 'order',
                customer_name: name,
                customer_telegram: tg.initDataUnsafe.user ? ('@' + tg.initDataUnsafe.user.username) : 'Не указан',
                delivery_address: addr,
                delivery_time: time,
                items: items,
                total_price: total
            };

            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
