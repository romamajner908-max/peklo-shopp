<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PEKLO SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: #141414;
            padding: 18px 16px;
            text-align: center;
            border-bottom: 2px solid #e8491d;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #e8491d;
            letter-spacing: 1px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 12px 12px 0 12px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .product-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: transform 0.15s ease;
        }
        .product-card:active {
            transform: scale(0.97);
        }
        .product-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background: #1a1a1a;
        }
        .product-info {
            padding: 10px 12px 12px 12px;
        }
        .product-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-desc {
            font-size: 11px;
            color: #888;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #e8491d;
        }
        .product-actions {
            margin-top: 8px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 8px 0;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
            text-align: center;
        }
        .btn-primary {
            background: #e8491d;
            color: #fff;
        }
        .btn-primary:active {
            background: #c73d17;
        }
        .btn-secondary {
            background: #2a2a2a;
            color: #e0e0e0;
        }
        .btn-secondary:active {
            background: #3a3a3a;
        }
        .btn-danger {
            background: #dc3545;
            color: #fff;
        }
        .btn-danger:active {
            background: #b02a37;
        }
        .empty-catalog {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-catalog h2 {
            font-size: 18px;
            color: #e8491d;
            margin-bottom: 8px;
        }
        .cart-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #141414;
            border-top: 2px solid #e8491d;
            padding: 12px 16px;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-info {
            display: flex;
            flex-direction: column;
        }
        .cart-count {
            font-size: 12px;
            color: #888;
        }
        .cart-total {
            font-size: 18px;
            font-weight: 700;
            color: #e8491d;
        }
        .cart-actions {
            display: flex;
            gap: 8px;
        }
        .cart-actions .btn {
            padding: 8px 16px;
            width: auto;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 30;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #1a1a1a;
            border-radius: 16px;
            max-width: 420px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            border: 1px solid #2a2a2a;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h2 {
            font-size: 20px;
            color: #e8491d;
        }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0 4px;
        }
        .modal-close:active {
            color: #fff;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            -webkit-appearance: none;
        }
        .form-group input:focus {
            border-color: #e8491d;
            outline: none;
        }
        .cart-items-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .cart-item-name {
            font-size: 13px;
        }
        .cart-item-price {
            font-size: 13px;
            color: #e8491d;
        }
        .cart-item .btn {
            padding: 4px 10px;
            font-size: 11px;
            width: auto;
        }
        .cart-summary {
            margin-bottom: 16px;
            padding: 12px;
            background: #0a0a0a;
            border-radius: 8px;
        }
        .cart-summary-item {
            font-size: 13px;
            padding: 2px 0;
            color: #ccc;
        }
        .cart-summary-total {
            font-size: 16px;
            font-weight: 700;
            color: #e8491d;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #2a2a2a;
        }
        .btn-block {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .footer {
            text-align: center;
            padding: 16px;
            color: #444;
            font-size: 11px;
            border-top: 1px solid #1a1a1a;
            margin-top: 20px;
        }
        .footer a {
            color: #666;
            text-decoration: none;
        }
        @media (max-width: 400px) {
            .product-image {
                height: 110px;
            }
            .product-name {
                font-size: 13px;
            }
            .product-price {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>PEKLO SHOP</h1>
</div>

<div class="container" id="app">
    <div id="productsContainer" class="products-grid"></div>
</div>

<div class="cart-panel" id="cartPanel">
    <div class="cart-info">
        <div class="cart-count" id="cartCount">0 товаров</div>
        <div class="cart-total" id="cartTotal">0 руб</div>
    </div>
    <div class="cart-actions">
        <button class="btn btn-secondary" onclick="openCart()">Корзина</button>
        <button class="btn btn-primary" onclick="openCheckout()">Оформить</button>
    </div>
</div>

<div class="modal-overlay" id="cartModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Корзина</h2>
            <button class="modal-close" onclick="closeCart()">&times;</button>
        </div>
        <div class="cart-items-list" id="cartItemsList"></div>
        <div style="text-align: right; font-size: 18px; font-weight: 700; color: #e8491d; margin-bottom: 16px;">
            Итого: <span id="cartModalTotal">0</span> руб
        </div>
        <button class="btn btn-primary btn-block" onclick="closeCart(); openCheckout();">Оформить заказ</button>
    </div>
</div>

<div class="modal-overlay" id="checkoutModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Оформление заказа</h2>
            <button class="modal-close" onclick="closeCheckout()">&times;</button>
        </div>
        <div class="cart-summary" id="checkoutSummary"></div>
        <form id="checkoutForm" onsubmit="submitOrder(event)">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" id="customerName" required placeholder="Иван Иванов">
            </div>
            <div class="form-group">
                <label>Telegram (username или ID)</label>
                <input type="text" id="customerTelegram" required placeholder="@username или ID">
            </div>
            <div class="form-group">
                <label>Адрес доставки (Челябинск)</label>
                <input type="text" id="deliveryAddress" required placeholder="Улица, дом, квартира">
            </div>
            <div class="form-group">
                <label>Время доставки</label>
                <input type="text" id="deliveryTime" required placeholder="Например: сегодня 18:00-20:00">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Оформить заказ</button>
        </form>
    </div>
</div>

<div class="footer">made by tr1ppy</div>

<script>
    var tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    var products = [];
    var cart = [];
    var cartCount = 0;
    var cartTotal = 0;

    // ИСПРАВЛЕНИЕ: Подтягиваем товары из сгенерированного JSON на гитхабе вместо локального урла
    function loadProducts() {
        var repoOwner = "romamajner908-max";
        var repoName = "peklo-shopp";
        var filePath = "products.json";
        var rawUrl = 'https://raw.githubusercontent.com/' + repoOwner + '/' + repoName + '/main/' + filePath;

        fetch(rawUrl + '?' + Date.now()) // Добавили временную метку против жесткого кэширования
            .then(function(r) { return r.json(); })
            .then(function(data) {
                products = data;
                renderProducts();
            })
            .catch(function() {
                products = [];
                renderEmptyCatalog();
            });
    }

    function renderProducts() {
        var container = document.getElementById('productsContainer');
        if (!products || products.length === 0) {
            renderEmptyCatalog();
            return;
        }
        container.innerHTML = '';
        for (var i = 0; i < products.length; i++) {
            var p = products[i];
            var card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML =
                '<img class="product-image" src="' + (p.image_url || 'https://via.placeholder.com/300x140/1a1a1a/444?text=PEKLO') + '" alt="' + p.name + '">' +
                '<div class="product-info">' +
                '<div class="product-name">' + p.name + '</div>' +
                '<div class="product-desc">' + (p.description || '') + '</div>' +
                '<div class="product-price">' + p.price + ' руб</div>' +
                '<div class="product-actions">' +
                '<button class="btn btn-primary" onclick="addToCart(' + p.id + ')">В корзину</button>' +
                '</div>' +
                '</div>';
            container.appendChild(card);
        }
    }

    function renderEmptyCatalog() {
        document.getElementById('productsContainer').innerHTML =
            '<div class="empty-catalog"><h2>Каталог пуст</h2><p>На данный момент товаров нет</p></div>';
    }

    function addToCart(productId) {
        var product = null;
        for (var i = 0; i < products.length; i++) {
            if (products[i].id === productId) {
                product = products[i];
                break;
            }
        }
        if (!product) return;
        var existing = null;
        for (var j = 0; j < cart.length; j++) {
            if (cart[j].id === productId) {
                existing = cart[j];
                break;
            }
        }
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ id: product.id, name: product.name, price: product.price, quantity: 1 });
        }
        updateCartUI();
        tg.HapticFeedback.impactOccurred('light');
    }

    function removeFromCart(productId) {
        for (var i = 0; i < cart.length; i++) {
            if (cart[i].id === productId) {
                if (cart[i].quantity > 1) {
                    cart[i].quantity -= 1;
                } else {
                    cart.splice(i, 1);
                }
                break;
            }
        }
        updateCartUI();
        renderCartItems();
    }

    function updateCartUI() {
        cartCount = 0;
        cartTotal = 0;
        for (var i = 0; i < cart.length; i++) {
            cartCount += cart[i].quantity;
            cartTotal += cart[i].price * cart[i].quantity;
        }
        document.getElementById('cartCount').textContent = cartCount + ' товаров';
        document.getElementById('cartTotal').textContent = cartTotal + ' руб';
    }

    function openCart() {
        renderCartItems();
        document.getElementById('cartModal').classList.add('active');
    }

    function closeCart() {
        document.getElementById('cartModal').classList.remove('active');
    }

    function renderCartItems() {
        var container = document.getElementById('cartItemsList');
        if (cart.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">Корзина пуста</div>';
            document.getElementById('cartModalTotal').textContent = '0';
            return;
        }
        container.innerHTML = '';
        for (var i = 0; i < cart.length; i++) {
            var item = cart[i];
            var div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML =
                '<span class="cart-item-name">' + item.name + ' x' + item.quantity + '</span>' +
                '<span class="cart-item-price">' + (item.price * item.quantity) + ' руб</span>' +
                '<button class="btn btn-danger" onclick="removeFromCart(' + item.id + ')">Удалить</button>';
            container.appendChild(div);
        }
        document.getElementById('cartModalTotal').textContent = cartTotal;
    }

    function openCheckout() {
        if (cart.length === 0) {
            tg.showAlert('Корзина пуста');
            return;
        }
        var summary = document.getElementById('checkoutSummary');
        var html = '';
        for (var i = 0; i < cart.length; i++) {
            html += '<div class="cart-summary-item">' + cart[i].name + ' x' + cart[i].quantity + ' = ' + (cart[i].price * cart[i].quantity) + ' руб</div>';
        }
        html += '<div class="cart-summary-total">Итого: ' + cartTotal + ' руб</div>';
        summary.innerHTML = html;
        document.getElementById('checkoutModal').classList.add('active');
    }

    function closeCheckout() {
        document.getElementById('checkoutModal').classList.remove('active');
    }

    function submitOrder(e) {
        e.preventDefault();
        var name = document.getElementById('customerName').value.trim();
        var telegram = document.getElementById('customerTelegram').value.trim();
        var address = document.getElementById('deliveryAddress').value.trim();
        var time = document.getElementById('deliveryTime').value.trim();
        if (!name || !address || !time) {
            tg.showAlert('Заполните все поля');
            return;
        }
        var orderData = {
            action: 'order',
            customer_name: name,
            customer_telegram: telegram || 'Не указан',
            delivery_address: address,
            delivery_time: time,
            items: cart,
            total_price: cartTotal
        };
        tg.sendData(JSON.stringify(orderData));
        cart = [];
        cartCount = 0;
        cartTotal = 0;
        updateCartUI();
        closeCheckout();
        tg.showAlert('Заказ оформлен');
    }

    loadProducts();
</script>

</body>
</html>
