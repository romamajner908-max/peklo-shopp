<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEKLO SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            padding-bottom: 60px;
        }
        .header {
            background: #1a1a1a;
            padding: 16px;
            text-align: center;
            border-bottom: 2px solid #e8491d;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #e8491d;
            letter-spacing: 2px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .product-card {
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-2px);
            border-color: #e8491d;
        }
        .product-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #2a2a2a;
        }
        .product-info {
            padding: 12px;
        }
        .product-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .product-desc {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #e8491d;
        }
        .product-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 8px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            flex: 1;
        }
        .btn-primary {
            background: #e8491d;
            color: #fff;
        }
        .btn-primary:hover {
            background: #c73d17;
        }
        .btn-secondary {
            background: #333;
            color: #e0e0e0;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .btn-danger {
            background: #dc3545;
            color: #fff;
        }
        .btn-danger:hover {
            background: #b02a37;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        .empty-catalog {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-catalog h2 {
            font-size: 20px;
            color: #e8491d;
            margin-bottom: 12px;
        }
        .cart-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 2px solid #e8491d;
            padding: 12px 16px;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-info {
            display: flex;
            flex-direction: column;
        }
        .cart-count {
            font-size: 12px;
            color: #888;
        }
        .cart-total {
            font-size: 18px;
            font-weight: 700;
            color: #e8491d;
        }
        .cart-actions {
            display: flex;
            gap: 8px;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 30;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #1e1e1e;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            border: 1px solid #333;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-close:hover {
            color: #fff;
        }
        .modal h2 {
            font-size: 20px;
            color: #e8491d;
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #e8491d;
            outline: none;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .cart-items-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .cart-item-name {
            font-size: 13px;
        }
        .cart-item-price {
            font-size: 13px;
            color: #e8491d;
        }
        .footer {
            text-align: center;
            padding: 16px;
            color: #555;
            font-size: 12px;
            border-top: 1px solid #2a2a2a;
            margin-top: 20px;
        }
        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .product-image {
                height: 120px;
            }
            .product-name {
                font-size: 13px;
            }
            .product-price {
                font-size: 14px;
            }
            .btn {
                font-size: 12px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>PEKLO SHOP</h1>
    </div>
    <div class="container" id="app">
        <div id="productsContainer" class="products-grid"></div>
    </div>
    <div class="cart-panel" id="cartPanel">
        <div class="cart-info">
            <div class="cart-count" id="cartCount">0 товаров</div>
            <div class="cart-total" id="cartTotal">0 руб</div>
        </div>
        <div class="cart-actions">
            <button class="btn btn-secondary btn-sm" onclick="openCart()">Корзина</button>
            <button class="btn btn-primary btn-sm" onclick="checkout()">Оформить</button>
        </div>
    </div>
    <div class="modal-overlay" id="cartModal">
        <div class="modal">
            <button class="modal-close" onclick="closeCart()">&times;</button>
            <h2>Ваша корзина</h2>
            <div class="cart-items-list" id="cartItemsList"></div>
            <div style="text-align: right; font-size: 18px; font-weight: 700; color: #e8491d; margin-bottom: 16px;">
                Итого: <span id="cartModalTotal">0</span> руб
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="closeCart(); checkout();">Оформить заказ</button>
        </div>
    </div>
    <div class="modal-overlay" id="checkoutModal">
        <div class="modal">
            <button class="modal-close" onclick="closeCheckout()">&times;</button>
            <h2>Оформление заказа</h2>
            <form id="checkoutForm" onsubmit="submitOrder(event)">
                <div class="form-group">
                    <label>Ваше имя</label>
                    <input type="text" id="customerName" required placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label>Telegram username или ID</label>
                    <input type="text" id="customerTelegram" required placeholder="@username или ID">
                </div>
                <div class="form-group">
                    <label>Адрес доставки (Челябинск)</label>
                    <input type="text" id="deliveryAddress" required placeholder="Улица, дом, квартира">
                </div>
                <div class="form-group">
                    <label>Желаемое время доставки</label>
                    <input type="text" id="deliveryTime" required placeholder="Например: сегодня 18:00-20:00">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Оформить заказ</button>
            </form>
        </div>
    </div>
    <div class="footer">
        made by tr1ppy
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        let products = [];
        let cart = [];
        let cartCount = 0;
        let cartTotal = 0;
        
        function loadProducts() {
            // Загружаем товары из products.json на Vercel
            fetch("products.json?" + new Date().getTime())
                .then(response => response.json())
                .then(data => {
                    products = data;
                    renderProducts();
                })
                .catch(() => {
                    // Если файла нет — показываем пустой каталог
                    products = [];
                    renderEmptyCatalog();
                });
        }
        
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                renderEmptyCatalog();
                return;
            }
            
            container.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img class="product-image" src="${product.image_url || 'https://via.placeholder.com/300x160/2a2a2a/888?text=PEKLO'}" alt="${product.name}">
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-desc">${product.description || ''}</div>
                        <div class="product-price">${product.price} руб</div>
                        <div class="product-actions">
                            <button class="btn btn-primary btn-sm" onclick="addToCart(${product.id})">В корзину</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        function renderEmptyCatalog() {
            document.getElementById('productsContainer').innerHTML = `
                <div class="empty-catalog" style="grid-column: 1 / -1;">
                    <h2>Каталог пуст</h2>
                    <p>На данный момент товаров нет.</p>
                </div>
            `;
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1
                });
            }
            
            updateCartUI();
            tg.HapticFeedback.impactOccurred('light');
        }
        
        function removeFromCart(productId) {
            const index = cart.findIndex(item => item.id === productId);
            if (index === -1) return;
            
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1;
            } else {
                cart.splice(index, 1);
            }
            
            updateCartUI();
            renderCartItems();
        }
        
        function updateCartUI() {
            cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            document.getElementById('cartCount').textContent = `${cartCount} товаров`;
            document.getElementById('cartTotal').textContent = `${cartTotal} руб`;
        }
        
        function openCart() {
            renderCartItems();
            document.getElementById('cartModal').classList.add('active');
        }
        
        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }
        
        function renderCartItems() {
            const container = document.getElementById('cartItemsList');
            
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">Корзина пуста</div>';
                document.getElementById('cartModalTotal').textContent = '0';
                return;
            }
            
            container.innerHTML = '';
            cart.forEach(item => {
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <span class="cart-item-name">${item.name} x${item.quantity}</span>
                    <span class="cart-item-price">${item.price * item.quantity} руб</span>
                    <button class="btn btn-danger btn-sm" onclick="removeFromCart(${item.id})">Удалить</button>
                `;
                container.appendChild(div);
            });
            
            document.getElementById('cartModalTotal').textContent = cartTotal;
        }
        
        function checkout() {
            if (cart.length === 0) {
                tg.showAlert('Ваша корзина пуста');
                return;
            }
            
            document.getElementById('checkoutModal').classList.add('active');
        }
        
        function closeCheckout() {
            document.getElementById('checkoutModal').classList.remove('active');
        }
        
        function submitOrder(event) {
            event.preventDefault();
            
            const name = document.getElementById('customerName').value.trim();
            const telegram = document.getElementById('customerTelegram').value.trim();
            const address = document.getElementById('deliveryAddress').value.trim();
            const time = document.getElementById('deliveryTime').value.trim();
            
            if (!name || !address || !time) {
                tg.showAlert('Заполните все обязательные поля');
                return;
            }
            
            const orderData = {
                action: 'order',
                customer_name: name,
                customer_telegram: telegram || 'Не указан',
                delivery_address: address,
                delivery_time: time,
                items: cart,
                total_price: cartTotal
            };
            
            tg.sendData(JSON.stringify(orderData));
            
            cart = [];
            cartCount = 0;
            cartTotal = 0;
            updateCartUI();
            
            closeCheckout();
            tg.showAlert('Заказ успешно оформлен!');
        }
        
        // Загружаем товары при старте
        loadProducts();
    </script>
</body>
        </html>
